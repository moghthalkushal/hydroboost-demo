    <rect x="206" width="216" height="44" rx="22" fill="#fff0ec" stroke="#ffd0c4"/>
    <text x="228" y="29" fill="#9f341c" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Claims-powered</text>
    <rect x="444" width="232" height="44" rx="22" fill="#ffffff" stroke="#dfe7ee"/>
    <text x="466" y="29" fill="#1f2933" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">GitHub Pages-ready</text>
  </g>
