<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Neutrogena Hydro Boost AEO/GEO Product Truth Demo</title>
  <desc id="desc">A clean public preview card for a claims-powered product truth proof of concept.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3fbff"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#9ee4ff"/>
      <stop offset="1" stop-color="#0677c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#111827" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="64" y="64" width="1072" height="502" rx="18" fill="url(#panel)" stroke="#dfe7ee"/>
  <path d="M104 142h210" stroke="#ef6847" stroke-width="8" stroke-linecap="round"/>
  <text x="104" y="214" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">Neutrogena Hydro Boost</text>
  <text x="104" y="282" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="760">Claims-Powered AEO/GEO Demo</text>
  <text x="104" y="350" fill="#5d6b78" font-family="Inter, Arial, sans-serif" font-size="25">Product truth objects, approved claims placeholders, answer-first content, and JSON-LD.</text>
  <g transform="translate(104 420)">
